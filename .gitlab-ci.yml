image: "redoxos/redoxer:latest"

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - build
  - host
  - test
  # TODO: benchmarks and profiling (maybe manually enabled for relevant MRs)?

build:
  stage: build
  script:
      # TODO: Update redoxer instead
    - rm -rf ~/.redoxer/${ARCH}-unknown-redox/toolchain 
    - TARGET=${ARCH}-unknown-redox redoxer toolchain
    - rustc --version
    - mkdir -p target/${ARCH}
    - TARGET=${ARCH}-unknown-redox redoxer env make BUILD=target/${ARCH}
  parallel:
    matrix:
      - ARCH: [x86_64, i686, aarch64, riscv64gc]

fmt:
  stage: host
  script:
      - rustup component add rustfmt-preview
      - cargo fmt -- --check

unit_test:
  stage: test
  script:
    - TARGET=x86_64-unknown-redox redoxer test
